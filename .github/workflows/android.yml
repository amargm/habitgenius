# ─────────────────────────────────────────────────────────────────────────────
# HabitGenius — GitHub Actions CI/CD
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions → New):
#
#   GOOGLE_SERVICES_JSON     base64 of android/app/google-services.json
#   CM_KEYSTORE              base64 of the release keystore file
#   CM_KEYSTORE_PASSWORD     HabitGenius@2026
#   CM_KEY_ALIAS             habitgenius
#   CM_KEY_PASSWORD          HabitGenius@2026
#
# To encode a file to base64 on Windows PowerShell:
#   [Convert]::ToBase64String([IO.File]::ReadAllBytes("path\to\file")) | Set-Clipboard
#
# Two jobs:
#   1. debug   — fast debug APK on every push to any branch
#   2. release — signed release AAB + APK on push/tag to main only
# ─────────────────────────────────────────────────────────────────────────────

name: Android Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Debug APK ─────────────────────────────────────────────────────────────
  debug:
    name: Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | tr -d '[:space:]' | base64 -d > android/app/google-services.json
          if [ ! -s android/app/google-services.json ]; then
            echo "ERROR: google-services.json is empty. Check the GOOGLE_SERVICES_JSON secret."
            exit 1
          fi
          python3 -c "import json,sys; json.load(open('android/app/google-services.json'))" || {
            echo "ERROR: google-services.json is not valid JSON."
            head -c 200 android/app/google-services.json
            exit 1
          }
          echo "google-services.json decoded and validated OK."

      - name: Get Flutter packages
        run: flutter pub get

      - name: Generate code (json_serializable + riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Dart analysis
        run: flutter analyze --no-fatal-infos

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/apk/debug/*.apk
          retention-days: 14

  # ── 2. Release AAB + APK (main branch / tags only) ───────────────────────────
  release:
    name: Release AAB
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | tr -d '[:space:]' | base64 -d > android/app/google-services.json
          if [ ! -s android/app/google-services.json ]; then
            echo "ERROR: google-services.json is empty. Check the GOOGLE_SERVICES_JSON secret."
            exit 1
          fi
          python3 -c "import json,sys; json.load(open('android/app/google-services.json'))" || {
            echo "ERROR: google-services.json is not valid JSON."
            exit 1
          }
          echo "google-services.json decoded and validated OK."

      - name: Decode keystore
        env:
          CM_KEYSTORE: ${{ secrets.CM_KEYSTORE }}
        run: |
          KEYSTORE_PATH=$GITHUB_WORKSPACE/android/app/habitgenius-release.keystore
          echo "$CM_KEYSTORE" | tr -d '[:space:]' | base64 -d > "$KEYSTORE_PATH"
          if [ ! -s "$KEYSTORE_PATH" ]; then
            echo "ERROR: keystore is empty. Check the CM_KEYSTORE secret."
            exit 1
          fi
          echo "CM_KEYSTORE_PATH=$KEYSTORE_PATH" >> $GITHUB_ENV
          echo "Keystore decoded OK."

      - name: Get Flutter packages
        run: flutter pub get

      - name: Generate code (json_serializable + riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Dart analysis
        run: flutter analyze --no-fatal-infos

      - name: Build release AAB
        env:
          CM_KEY_ALIAS: ${{ secrets.CM_KEY_ALIAS }}
          CM_KEY_PASSWORD: ${{ secrets.CM_KEY_PASSWORD }}
          CM_KEYSTORE_PASSWORD: ${{ secrets.CM_KEYSTORE_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}

      - name: Build release APK
        env:
          CM_KEY_ALIAS: ${{ secrets.CM_KEY_ALIAS }}
          CM_KEY_PASSWORD: ${{ secrets.CM_KEY_PASSWORD }}
          CM_KEYSTORE_PASSWORD: ${{ secrets.CM_KEYSTORE_PASSWORD }}
        run: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/apk/release/*.apk
          retention-days: 30

      # Publish a GitHub Release so the APK is directly downloadable:
      #   - push to main  → updates the rolling "latest" release
      #   - push a v* tag → creates a versioned release (e.g. v1.2.0)
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          make_latest: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || 'false' }}
          files: |
            build/app/outputs/bundle/release/*.aab
            build/app/outputs/apk/release/*.apk
