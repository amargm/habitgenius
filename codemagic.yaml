# ─────────────────────────────────────────────────────────────────────────────
# HabitGenius — Codemagic CI/CD
#
# Required variables — set these in Codemagic UI → App settings → Environment
# variables (no group needed, just plain app-level variables):
#
#   GOOGLE_SERVICES_JSON   base64 of android/app/google-services.json
#
# Required variable group (Codemagic UI → Teams → Global vars or per-app):
#
#   keystore_credentials
#     CM_KEYSTORE           base64 of android/app/habitgenius-release.keystore
#     CM_KEYSTORE_PASSWORD  HabitGenius@2026
#     CM_KEY_ALIAS          habitgenius
#     CM_KEY_PASSWORD       HabitGenius@2026
#
# Two workflows:
#   1. android-debug   — fast debug APK on every push to dev/*  or main
#   2. android-release — signed release AAB on push to main only
# ─────────────────────────────────────────────────────────────────────────────

workflows:

  # ── 1. Android Debug APK ────────────────────────────────────────────────────
  android-debug:
    name: Android Debug APK
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "dev/*"
          include: true
        - pattern: main
          include: true

    environment:
      flutter: stable
      java: 17
      groups:
        - firebase
      vars:
        PACKAGE_NAME: "com.habitgenius"

    scripts:
      - name: Set Android SDK path
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Write google-services.json
        script: |
          # Strip any whitespace/newlines that may have been introduced when
          # the base64 value was pasted into the Codemagic UI, then decode.
          echo "$GOOGLE_SERVICES_JSON" | tr -d '[:space:]' | base64 -d > android/app/google-services.json
          # Fail fast with a clear message rather than letting Gradle spend
          # 7 minutes before reporting "Malformed root json".
          if [ ! -s android/app/google-services.json ]; then
            echo "ERROR: google-services.json is empty. Check that GOOGLE_SERVICES_JSON is set correctly in Codemagic environment variables."
            exit 1
          fi
          if ! python3 -c "import json,sys; json.load(open('android/app/google-services.json'))" 2>/dev/null; then
            echo "ERROR: google-services.json is not valid JSON. The base64 value may be corrupted."
            echo "File contents (first 200 chars):"
            head -c 200 android/app/google-services.json
            exit 1
          fi
          echo "google-services.json decoded and validated OK."

      - name: Print debug keystore SHA-1 (add this to Firebase Console)
        script: |
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            2>/dev/null | grep -E "SHA1:|SHA256:" || echo "Could not read debug keystore"

      - name: Get Flutter packages
        script: flutter pub get

      - name: Generate code (json_serializable + riverpod)
        script: dart run build_runner build --delete-conflicting-outputs

      - name: Dart code analysis
        script: flutter analyze --no-fatal-infos

      - name: Build debug APK
        script: flutter build apk --debug

    artifacts:
      - build/app/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - mugaliamar@gmail.com
        notify:
          success: true
          failure: true

  # ── 2. Android Release AAB (Signed) ─────────────────────────────────────────
  android-release:
    name: Android Release AAB (Signed)
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
      tag_patterns:
        - pattern: "v*"
          include: true

    environment:
      flutter: stable
      java: 17
      groups:
        - keystore_credentials
        - firebase
      vars:
        PACKAGE_NAME: "com.habitgenius"

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Generate code (json_serializable)
        script: dart run build_runner build --delete-conflicting-outputs

      - name: Dart code analysis
        script: flutter analyze --no-fatal-infos

      - name: Set Android SDK path
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Write google-services.json
        script: |
          echo "$GOOGLE_SERVICES_JSON" | tr -d '[:space:]' | base64 -d > android/app/google-services.json
          if [ ! -s android/app/google-services.json ]; then
            echo "ERROR: google-services.json is empty. Check GOOGLE_SERVICES_JSON in Codemagic environment variables."
            exit 1
          fi
          if ! python3 -c "import json,sys; json.load(open('android/app/google-services.json'))" 2>/dev/null; then
            echo "ERROR: google-services.json is not valid JSON."
            head -c 200 android/app/google-services.json
            exit 1
          fi
          echo "google-services.json decoded and validated OK."

      - name: Decode keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/android/app/habitgenius-release.keystore

      - name: Build release AAB
        script: |
          flutter build appbundle --release \
            --build-name=1.0.0 \
            --build-number=$PROJECT_BUILD_NUMBER

      - name: Build release APK (for direct install testing)
        script: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=$PROJECT_BUILD_NUMBER

    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - mugaliamar@gmail.com
        notify:
          success: true
          failure: true
      # Uncomment to publish to Play Store internal track when ready:
      # google_play:
      #   credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      #   track: internal
      #   submit_as_draft: true
