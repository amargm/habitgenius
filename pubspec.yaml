name: habitgenius
description: "HabitGenius - Habit, Mood, Focus, Journal & Expense tracker"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.7.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.3
  google_sign_in: ^6.2.1
  firebase_auth: ^5.5.2
  firebase_core: ^3.13.1
  path_provider: ^2.1.5
  file_picker: ^8.3.7
  shared_preferences: ^2.3.5
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  in_app_purchase: ^3.2.0
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  flutter_quill: ^11.5.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.14
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
