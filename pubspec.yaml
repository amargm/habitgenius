name: habitgenius
description: "HabitGenius - Habit, Mood, Focus, Journal & Expense tracker"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.7.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.3
  google_sign_in: ^6.2.1
  path_provider: ^2.1.5
  file_picker: ^8.3.7
  shared_preferences: ^2.3.5
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.0
  in_app_purchase: ^3.2.0
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  flutter_quill: ^11.5.0
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0
  url_launcher: ^6.3.2
  cupertino_icons: ^1.0.8
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  firebase_analytics: ^11.5.0
  cloud_firestore: ^5.6.0
  flutter_colorpicker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.14
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.1
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  # assets:  # Add assets here when image files are present
  #   - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "iconHG.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "iconHG.png"
  min_sdk_android: 26
